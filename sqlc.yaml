version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/postgres/queries"
    schema: "internal/postgres/migrations"
    gen:
      go:
        package: "db"
        out: "internal/postgres/db"
        sql_package: "pgx/v5"
        emit_db_tags: true
        emit_json_tags: false
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
